name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Fixes'
    labels: ['fix', 'bug']
  - title: '🧰 Maintenance'
    labels: ['chore', 'docs', 'dependencies']

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
no-changes-template: '- No user-facing changes'

# Next version is bumped from the previous tag based on merged PR labels.
version-resolver:
  major:
    labels: ['major', 'breaking']
  minor:
    labels: ['minor', 'feature', 'enhancement']
  patch:
    labels: ['patch', 'fix', 'bug', 'chore', 'docs']
  default: patch

template: |
  ## What's changed

  $CHANGES

  **Full changelog**: https://github.com/paul-vd/NightBar/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

# Auto-apply labels to PRs (from same-repo branches) so the changelog groups
# them. Fork PRs won't get auto-labeled; label those manually if you care.
autolabeler:
  - label: 'feature'
    branch: ['/^feat(ure)?\/.+/']
    title: ['/^feat/i']
  - label: 'fix'
    branch: ['/^fix\/.+/']
    title: ['/^fix/i']
  - label: 'docs'
    branch: ['/^docs?\/.+/']
    title: ['/^docs/i']
  - label: 'chore'
    branch: ['/^chore\/.+/']
    title: ['/^chore/i']
