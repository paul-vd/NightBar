name: Release

# Push a version tag to cut a release, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Builds the .app and packages the styled .dmg. On the CI runner the
      # Finder-styling step may be skipped (no GUI session); the Makefile makes
      # that non-fatal, so a fully functional DMG is still produced.
      - name: Build DMG
        run: make dmg

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NightBar.dmg
          generate_release_notes: true   # auto-changelog from merged PRs since last tag
          fail_on_unmatched_files: true
