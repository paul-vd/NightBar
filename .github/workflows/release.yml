name: Release

# Fires when you publish the draft that Release Drafter maintains
# (Releases tab -> edit the draft -> Publish). Publishing creates the tag,
# then this builds the DMG and attaches it to that release.
on:
  release:
    types: [published]

permissions:
  contents: write   # to upload the DMG asset

jobs:
  attach-dmg:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Builds the .app and packages the DMG. The Finder-styling step is
      # skipped on CI (no GUI session); the Makefile keeps that non-fatal, so a
      # functional DMG is still produced.
      - name: Build DMG
        run: make dmg

      - name: Attach DMG to the release
        run: gh release upload "${{ github.event.release.tag_name }}" dist/NightBar.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
