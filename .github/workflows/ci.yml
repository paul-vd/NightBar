name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Syntax check
        run: python3 -m py_compile nightbar.py setup.py assets/make_icon.py assets/make_dmg_bg.py

      # Confirms the app actually bundles (catches broken deps / setup.py).
      - name: Build .app
        run: make build
